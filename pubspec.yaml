name: zgeostatus
description: "The Ultimate Tactical GPS Command Center."
# The following line prevents the package from being accidentally published to

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  shared_preferences: ^2.2.2
  torch_light: ^1.0.0
  flutter_compass: ^0.8.0
  share_plus: ^12.0.1
  geocoding: ^4.0.0
  battery_plus: ^7.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  path_provider: ^2.1.2
  gal: ^2.3.0
  http: ^1.2.1
  image: ^4.2.0
  screenshot: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

